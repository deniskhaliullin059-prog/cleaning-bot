{% extends "base.html" %}
{% block title %}Чаты — ООО ВИД CRM{% endblock %}
{% block page_title %}Чаты с клиентами{% endblock %}

{% block content %}
<div class="flex gap-0 bg-white rounded-xl shadow-sm overflow-hidden" style="height: calc(100dvh - 72px);">

  <!-- Левая панель: список клиентов -->
  <div id="clients-panel" class="w-full md:w-72 border-r border-slate-200 flex flex-col shrink-0">
    <div class="px-4 py-3 border-b border-slate-100">
      <input id="search-input" type="text" placeholder="Поиск клиента..."
        class="w-full bg-slate-100 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <div id="clients-list" class="flex-1 overflow-y-auto">
      <div class="text-center py-10 text-slate-400 text-sm">Загрузка...</div>
    </div>
  </div>

  <!-- Правая панель: переписка -->
  <div id="chat-panel" class="hidden md:flex flex-col flex-1 min-w-0">
    <!-- Шапка чата -->
    <div id="chat-header" class="px-4 py-3 border-b border-slate-200 flex items-center gap-3 shrink-0 bg-white">
      <!-- Кнопка назад (только мобилка) -->
      <button id="back-btn" onclick="showClientsList()" class="md:hidden p-1 rounded-lg hover:bg-slate-100 shrink-0">
        <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <div id="chat-avatar" class="w-9 h-9 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-sm hidden shrink-0"></div>
      <div class="min-w-0">
        <div id="chat-name" class="font-semibold text-sm text-slate-700 truncate">Выберите клиента</div>
        <div id="chat-uid" class="text-xs text-slate-400"></div>
      </div>
    </div>

    <!-- Сообщения -->
    <div id="messages-area" class="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-3 bg-slate-50">
      <div class="text-center text-slate-400 text-sm mt-10">Выберите клиента для просмотра переписки</div>
    </div>

    <!-- Поле ввода -->
    <div id="input-area" class="px-3 py-3 border-t border-slate-200 bg-white flex gap-2 shrink-0">
      <input id="msg-input" type="text" placeholder="Введите сообщение..."
        class="flex-1 bg-slate-100 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-400 min-w-0"
        disabled>
      <button id="send-btn"
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition disabled:opacity-50 disabled:cursor-not-allowed shrink-0"
        disabled>
        <span class="hidden sm:inline">Отправить</span>
        <svg class="w-5 h-5 sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
      </button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function showChat() {
    if (window.innerWidth < 768) {
      document.getElementById('clients-panel').classList.add('hidden');
      document.getElementById('chat-panel').classList.remove('hidden');
      document.getElementById('chat-panel').classList.add('flex');
    }
  }
  function showClientsList() {
    if (window.innerWidth < 768) {
      document.getElementById('clients-panel').classList.remove('hidden');
      document.getElementById('chat-panel').classList.add('hidden');
      document.getElementById('chat-panel').classList.remove('flex');
    }
  }
</script>
<script src="/static/js/chats.js"></script>
{% endblock %}
