{% extends "base.html" %}
{% block title %}Чаты — ООО ВИД CRM{% endblock %}
{% block page_title %}Чаты с клиентами{% endblock %}

{% block content %}
<div class="flex gap-0 bg-white rounded-xl shadow-sm overflow-hidden" style="height: calc(100vh - 140px);">

  <!-- Левая панель: список клиентов -->
  <div class="w-72 border-r border-slate-200 flex flex-col shrink-0">
    <div class="px-4 py-3 border-b border-slate-100">
      <input id="search-input" type="text" placeholder="Поиск клиента..."
        class="w-full bg-slate-100 rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <div id="clients-list" class="flex-1 overflow-y-auto">
      <div class="text-center py-10 text-slate-400 text-sm">Загрузка...</div>
    </div>
  </div>

  <!-- Правая панель: переписка -->
  <div class="flex-1 flex flex-col">
    <!-- Шапка чата -->
    <div id="chat-header" class="px-5 py-3 border-b border-slate-200 flex items-center gap-3 shrink-0 bg-white">
      <div id="chat-avatar" class="w-9 h-9 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-sm hidden"></div>
      <div>
        <div id="chat-name" class="font-semibold text-sm text-slate-700">Выберите клиента</div>
        <div id="chat-uid" class="text-xs text-slate-400"></div>
      </div>
    </div>

    <!-- Сообщения -->
    <div id="messages-area" class="flex-1 overflow-y-auto px-5 py-4 flex flex-col gap-3 bg-slate-50">
      <div class="text-center text-slate-400 text-sm mt-10">Выберите клиента для просмотра переписки</div>
    </div>

    <!-- Поле ввода -->
    <div id="input-area" class="px-4 py-3 border-t border-slate-200 bg-white flex gap-2 shrink-0">
      <input id="msg-input" type="text" placeholder="Введите сообщение..."
        class="flex-1 bg-slate-100 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-400"
        disabled>
      <button id="send-btn"
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl text-sm font-medium transition disabled:opacity-50 disabled:cursor-not-allowed"
        disabled>
        Отправить
      </button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/chats.js"></script>
{% endblock %}
