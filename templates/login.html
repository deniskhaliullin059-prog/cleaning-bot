<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — ООО ВИД CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eef2ff', 100:'#e0e7ff', 500:'#4f46e5', 600:'#4338ca', 700:'#3730a3', 900:'#1e1b4b' },
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <!-- Логотип -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 bg-brand-500 rounded-2xl flex items-center justify-center text-white text-2xl font-bold mb-3 shadow-lg">В</div>
      <h1 class="text-white text-xl font-bold">ООО ВИД</h1>
      <p class="text-slate-400 text-sm mt-1">CRM система управления заявками</p>
    </div>

    <!-- Карточка входа -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-slate-800 text-lg font-semibold mb-6 text-center">Вход в систему</h2>

      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-4 flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="mb-5">
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Пароль</label>
          <input
            type="password"
            name="password"
            autofocus
            autocomplete="current-password"
            placeholder="Введите пароль"
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-slate-800 text-sm
                   focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent
                   placeholder:text-slate-400"
          >
        </div>
        <button
          type="submit"
          class="w-full bg-brand-500 hover:bg-brand-600 text-white font-medium py-2.5 px-4 rounded-lg
                 transition-colors text-sm"
        >
          Войти
        </button>
      </form>
    </div>

    <p class="text-center text-slate-500 text-xs mt-6">Профессиональный клининг для бизнеса</p>
  </div>
</body>
</html>
