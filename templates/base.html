<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ООО ВИД — CRM{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eef2ff', 100:'#e0e7ff', 500:'#4f46e5', 600:'#4338ca', 700:'#3730a3', 900:'#1e1b4b' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/custom.css">
  {% block head %}{% endblock %}
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen flex">

  <!-- Оверлей для мобильного меню -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden" onclick="closeSidebar()"></div>

  <!-- Боковая панель -->
  <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-brand-900 text-white flex flex-col
                              transform -translate-x-full transition-transform duration-200
                              md:static md:translate-x-0 md:shrink-0">
    <div class="px-6 py-5 border-b border-brand-700">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-brand-500 rounded-lg flex items-center justify-center text-lg font-bold">В</div>
        <div>
          <div class="font-bold text-sm leading-tight">ООО ВИД</div>
          <div class="text-xs text-brand-100 opacity-70">CRM система</div>
        </div>
        <button onclick="closeSidebar()" class="ml-auto md:hidden text-white/60 hover:text-white">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}" onclick="closeSidebar()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Дашборд
      </a>
      <a href="/chats" class="nav-link {% if request.path == '/chats' %}active{% endif %}" onclick="closeSidebar()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        Чаты с клиентами
        <span id="nav-badge" class="ml-auto bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5 hidden">0</span>
      </a>
      <a href="/kanban" class="nav-link {% if request.path == '/kanban' %}active{% endif %}" onclick="closeSidebar()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
        </svg>
        Канбан
      </a>
      <a href="/schedule" class="nav-link {% if request.path == '/schedule' %}active{% endif %}" onclick="closeSidebar()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        Расписание
      </a>
    </nav>
    <div class="px-4 py-4 border-t border-brand-700 text-xs text-brand-100 opacity-50">
      Профессиональный клининг<br>для бизнеса
    </div>
  </aside>

  <!-- Основное содержимое -->
  <main class="flex-1 flex flex-col overflow-hidden min-w-0">
    <header class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shrink-0">
      <!-- Hamburger -->
      <button onclick="openSidebar()" class="md:hidden p-1 rounded-lg hover:bg-slate-100 mr-3">
        <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <h1 class="text-base font-semibold text-slate-800 truncate">{% block page_title %}{% endblock %}</h1>
      <div class="flex items-center gap-3 text-sm text-slate-500 ml-3 shrink-0">
        <span id="clock" class="hidden sm:inline"></span>
        <div class="w-2 h-2 rounded-full bg-green-400"></div>
        <span class="hidden sm:inline">Бот активен</span>
        <a href="/logout" class="flex items-center gap-1 text-slate-400 hover:text-slate-700 transition-colors" title="Выйти">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          <span class="hidden sm:inline">Выйти</span>
        </a>
      </div>
    </header>
    <div class="flex-1 overflow-auto p-4 md:p-6">
      {% block content %}{% endblock %}
    </div>
  </main>

  <script>
    function openSidebar() {
      document.getElementById('sidebar').classList.remove('-translate-x-full');
      document.getElementById('sidebar-overlay').classList.remove('hidden');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.add('-translate-x-full');
      document.getElementById('sidebar-overlay').classList.add('hidden');
    }
    function updateClock() {
      const el = document.getElementById('clock');
      if (el) el.textContent = new Date().toLocaleTimeString('ru-RU');
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
